<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Counter - ToolNova</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
<h1>Word Counter</h1>
<p>Count Words & Characters Instantly</p>
</header>

<div class="grid">

<div class="card">

<textarea id="text" rows="10" placeholder="Type or paste text here..."></textarea>

<button onclick="countWords()">Count</button>

<h2 id="words">Words : 0</h2>

<h2 id="chars">Characters : 0</h2>

</div>

</div>

<script src="../js/word-counter.js"></script>

</body>
</html>
